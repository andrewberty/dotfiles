###########
# OPTIONS #
###########
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g default-terminal "$TERM"
set -ga terminal-features ",*:usstyle"
set -gs terminal-overrides ",*:RGB"

set -as terminal-overrides ',xterm-kitty:blink=\E[5m'
set -as terminal-overrides ',xterm-ghostty:Smol=\E[53m:Rmol=\E[55m'

set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm-kitty:extkeys:hyperlinks'
set -as terminal-features 'xterm-ghostty:extkeys:hyperlinks'

set -g detach-on-destroy off # don't detach tmux when killing a session

set -g popup-border-lines rounded
set -g popup-border-style fg=colour235
set -g pane-border-style fg=colour235
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour235

set -g allow-passthrough on

set -g set-clipboard on

set -g visual-bell off
set -g visual-activity off

set -g base-index 1
set -g automatic-rename on
set -g renumber-windows on
set -g allow-rename off
set -g pane-base-index 1
set -g set-titles on

set -g mouse on
set -g focus-events on
set -g mode-keys vi # Use Vi mode

set -g history-limit 10000

set -g escape-time 1
set -g display-time 1500

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

###########
# KEYMAPS #
###########
bind R source-file "~/dotfiles/tmux/tmux.conf" \; display-message " 󰄵  Configuration Reloaded!"

bind x kill-pane
bind C-x kill-session

bind | split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

bind -r C-Left  resize-pane -L 1
bind -r C-Right resize-pane -R 1
bind -r C-Down  resize-pane -D 1
bind -r C-Up    resize-pane -U 1

unbind Tab
unbind n
unbind p
bind -n M-Tab next-window

bind k display-popup -E -w 50% "sesh connect \"$(
	sesh list -i | gum filter --indicator='▸' --limit 1 --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

bind -n C-f popup -E "fc-list : family spacing \
    | grep -E 'spacing=(90|100)' \
    | cut -d ':' -f1 \
    | cut -d ',' -f1 \
    | grep -Ev 'Emoji|Braille|Symbol|Icons|Bitmap|GB18030' \
    | grep -v '^\\.' \
    | sort -u \
    | fzf --color=bg+:-1 --reverse --preview-window=down,1 \
    --preview='lua ~/dotfiles/scripts/ghostty/font-switcher.lua {}'"

# bind -n C-k popup -E "ghostty +list-themes \
#     | sed -E 's/[[:space:]]*\\((resources|user)\\)[[:space:]]*//g' \
#     | fzf --color=bg+:-1 --reverse --preview-window=down,1 \
#     --preview='lua ~/dotfiles/scripts/ghostty/theme-switcher.lua {}'"

%hidden VIM_PATTERN='(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'
%hidden IS_VIM="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${VIM_PATTERN}'"

bind -n 'M-Left'  if-shell "$IS_VIM" 'send-keys M-Left'   'select-pane -L'
bind -n 'M-Down'  if-shell "$IS_VIM" 'send-keys M-Down'   'select-pane -D'
bind -n 'M-Up'    if-shell "$IS_VIM" 'send-keys M-Up'     'select-pane -U'
bind -n 'M-Right' if-shell "$IS_VIM" 'send-keys M-Right'  'select-pane -R'

bind -T copy-mode-vi 'M-Left' select-pane -L
bind -T copy-mode-vi 'M-Down' select-pane -D
bind -T copy-mode-vi 'M-Up' select-pane -U
bind -T copy-mode-vi 'M-Right' select-pane -R
bind -T copy-mode-vi Escape             send-keys -X cancel

###########
# STATUS #
###########
set -g status-justify left
set -g status-position top
set -g status-interval 1
set -g status-style bg=terminal,fg=terminal

set -g status-left-length 200
set -g status-left "#[fg=red]  #[fg=cyan]#{session_name} "

set -g status-right ""
set -g window-status-format " #{window_name} #[fg=yellow]#{?window_zoomed_flag,󰍉,}" # window_name -> pane_current_command
set -g window-status-current-format " #{window_name} #[fg=yellow]#{?window_zoomed_flag,󰍉,}"

set -g status-style "fg=white bg=default"
set -g message-style "fg=white bg=default"

set -g window-status-current-style fg=colour004
set -g window-status-style fg=colour238
set -g window-status-activity-style none
