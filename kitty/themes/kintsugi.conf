# Kintsugi theme for kitty
# https://github.com/metalelf0/kintsugi-nvim
#
# Drop this into ~/.config/kitty/ and add to kitty.conf:
#   include kintsugi.conf

foreground              #cacac2
background              #131314
selection_foreground    #dddddd
selection_background    #47464c

cursor                  #d4a943
cursor_text_color       #0e0e0e

url_color               #8fa3b3

# Tabs
active_tab_foreground   #dddddd
active_tab_background   #161618
active_tab_font_style   bold
inactive_tab_foreground #969b8c
inactive_tab_background #131314
inactive_tab_font_style normal
tab_bar_background      #131314

# Window borders
active_border_color     #b8943a
inactive_border_color   #2a2a28
bell_border_color       #ebcb8b

# Marks
mark1_foreground #131314
mark1_background #b8943a
mark2_foreground #131314
mark2_background #a3be8c
mark3_foreground #131314
mark3_background #b3a3d3

# 16 ansi colors
color0  #131314
color8  #444444
color1  #b38f8f
color9  #d9a6a6
color2  #a3be8c
color10 #c3de9c
color3  #ebcb8b
color11 #fbe4a8
color4  #6c7a8a
color12 #8fa3b3
color5  #b3a3d3
color13 #d3a3d3
color6  #6ac6f2
color14 #8ac6f2
color7  #dddddd
color15 #ffffff
