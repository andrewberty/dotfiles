allow_remote_control yes
listen_on unix:/tmp/mykitty
startup_session ~/dotfiles/kitty/sessions/startup.session

disable_ligatures always
macos_thicken_font 0.2
font_size 13

cursor_blink_interval 0
scrollback_lines 10000
scrollbar never

copy_on_select yes
strip_trailing_spaces smart

dynamic_background_opacity yes
background_blur 50
hide_window_decorations titlebar-only
macos_titlebar_color background
confirm_os_window_close 0
notify_on_cmd_finish never
enable_audio_bell no
window_alert_on_bell no
command_on_bell none

shell_integration no-title
window_title_template "{title}"

remember_window_size  yes
remember_window_position yes
placement_strategy center
window_padding_width 5
tab_bar_edge top
tab_bar_style powerline

macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_colorspace displayp3

kitty_mod cmd

map ctrl+k kitten themes --reload-in=all --config-file-name=theme.conf
map ctrl+f kitten choose-fonts --reload-in=all --config-file-name=font.conf
map kitty_mod+k launch --type=overlay ~/dotfiles/kitty/scripts/project-picker.zsh

map ctrl+b launch --type=overlay kitten kittens/set_background.py
map ctrl+shift+= kitten kittens/adjust_bg.py brighten 0.5
map ctrl+shift+- kitten kittens/adjust_bg.py darken 0.5
map ctrl+shift+0 kitten kittens/adjust_bg.py reset

map ctrl+shift+] kitten kittens/adjust_cell_height.py increase
map ctrl+shift+[ kitten kittens/adjust_cell_height.py decrease
map ctrl+shift+\ kitten kittens/adjust_cell_height.py reset

enabled_layouts splits:split_axis=horizontal,stack
map kitty_mod+enter toggle_layout stack

map kitty_mod+shift+\ launch --location=hsplit --cwd=current
map kitty_mod+\ launch --location=vsplit --cwd=current
map kitty_mod+t new_tab_with_cwd

map opt+down neighboring_window down
map opt+up neighboring_window up
map opt+left neighboring_window left
map opt+right neighboring_window right

# Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM opt+down
map --when-focus-on var:IS_NVIM opt+up
map --when-focus-on var:IS_NVIM opt+left
map --when-focus-on var:IS_NVIM opt+right

map opt+shift+left resize_window narrower
map opt+shift+right resize_window wider
map opt+shift+up resize_window taller
map opt+shift+down resize_window shorter 3
map opt+shift+0 resize_window reset

map kitty_mod+equal kitten kittens/adjust_font_size.py increase 0.5
map kitty_mod+minus kitten kittens/adjust_font_size.py decrease 0.5
map kitty_mod+0 kitten kittens/adjust_font_size.py reset

map kitty_mod+shift+p command_palette
map kitty_mod+shift+h show_scrollback

map opt+c set_background_opacity +0.05
map opt+z set_background_opacity -0.05
map opt+x set_background_opacity default

map kitty_mod+shift+, load_config_file

include theme.conf
include font.conf
include local.conf

tab_bar_background none
tab_bar_margin_color none
wayland_titlebar_color background 
macos_titlebar_color background